<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="16"/>
  <!-- subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="30" x2="1200" y2="30"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="330" x2="1200" y2="330"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="570" x2="1200" y2="570"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- wolf emoji -->
  <text x="140" y="400" text-anchor="middle" font-size="200">🐺</text>
  <!-- site name -->
  <text x="340" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#e0e0e0" letter-spacing="2">harrsoft alpha</text>
  <!-- tagline -->
  <text x="340" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#888" letter-spacing="1">thoughts, essays, and exploration</text>
  <!-- accent line -->
  <rect x="340" y="410" width="80" height="4" rx="2" fill="#58a6ff"/>
</svg>
