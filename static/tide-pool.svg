<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Tide Pool Icon — Bounded Autonomy Visual System -->
  <!-- Background circle (dark pool bed) -->
  <circle cx="48" cy="48" r="44" fill="#0D4F5A" stroke="#2E9B8E" stroke-width="1.5" stroke-opacity="0.3"/>
  
  <!-- Opening gap — faces right, the pool is defined but permeable -->
  <clipPath id="pool-clip">
    <path d="M48 4 A44 44 0 1 1 75 87 L92 96 L4 96 L4 4 Z"/>
  </clipPath>
  
  <!-- The water — contained but undulating wave form -->
  <g clip-path="url(#pool-clip)">
    <!-- Tide water body -->
    <path d="M4 52 Q24 44 48 52 Q72 60 92 50 L92 96 L4 96 Z" fill="#2E9B8E" opacity="0.85"/>
    
    <!-- Wave crest -->
    <path d="M4 50 Q16 42 28 50 Q40 58 52 48 Q64 38 76 48 Q84 54 92 48" 
          fill="none" stroke="#E8D5B7" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
    
    <!-- Second wave -->
    <path d="M4 62 Q20 56 36 62 Q52 68 68 60 Q80 54 92 60" 
          fill="none" stroke="#E8D5B7" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
  </g>
  
  <!-- Pool boundary — stroke on visible arcs (not the opening) -->
  <path d="M48 4 A44 44 0 1 1 75 87" fill="none" stroke="#2E9B8E" stroke-width="2" stroke-opacity="0.6"/>
  <path d="M75 87" fill="none" stroke="#2E9B8E" stroke-width="2" stroke-opacity="0.6"/>
  
  <!-- Subtle keyhole line at opening — accessible by consent -->
  <line x1="75" y1="87" x2="77" y2="85" stroke="#FF6B5B" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round" transform="rotate(5, 75, 86)"/>

  <!-- Tiny CoralFlare dot — consent marker at the edge -->
  <circle cx="75" cy="87" r="1.5" fill="#FF6B5B" opacity="0.6"/>
</svg>
